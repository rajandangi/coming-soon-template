<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>MADAN OLI</title>
    <link rel="icon" href="madan-oli.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Poppins', ui-sans-serif, system-ui;
            --color-college-blue: #0f5ca8;
            --color-college-navy: #0b2239;
            --color-college-green: #2f9d62;
            --color-college-gold: #f3b33d;
            --shadow-glow: 0 24px 80px rgba(15, 92, 168, 0.18);
        }
    </style>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="min-h-screen overflow-x-hidden bg-slate-50 font-sans text-slate-900 antialiased">
    <div class="pointer-events-none fixed inset-0 -z-10">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(47,157,98,0.14),transparent_32%),linear-gradient(135deg,#f8fafc_0%,#eef7f3_48%,#fff7e8_100%)]"></div>
    </div>

    <header class="px-5 pt-5 lg:px-8">
        <nav class="site-nav mx-auto flex max-w-7xl items-center justify-center px-5 py-5 text-center"
            aria-label="Primary navigation">
            <a href="#content"
                class="group flex min-w-0 flex-col items-center gap-3 rounded-2xl focus:outline-none focus:ring-4 focus:ring-college-blue/20">
                <img src="madan-oli.jpg" alt="Madan Oli logo"
                    class="h-14 w-14 rounded-2xl border border-slate-200 bg-white object-cover p-1 shadow-sm transition group-hover:-translate-y-0.5">
                <div class="min-w-0">
                    <h1 class="text-base font-extrabold uppercase leading-tight text-college-navy sm:text-lg">
                        Madan Oli
                    </h1>
                </div>
            </a>
        </nav>
    </header>

    <main id="content" class="mx-auto max-w-7xl px-5 py-8 sm:py-10 lg:px-8 lg:py-12">
        <section class="hero-stage reveal">
            <img src="dev_productivity_with_animations.svg" class="hero-illustration"
                alt="" aria-hidden="true">

            <div class="hero-content relative z-10 max-w-2xl">
                <div class="mb-7 inline-flex items-center gap-2 rounded-full bg-college-blue/10 px-4 py-2 text-sm font-semibold text-college-blue">
                    <span class="h-2 w-2 rounded-full bg-college-gold"></span>
                    Coming soon
                </div>

                <div class="main-title">
                    <h2 class="max-w-2xl text-4xl font-extrabold uppercase leading-[1.05] text-college-navy sm:text-5xl lg:text-6xl">
                        Website under construction
                    </h2>
                </div>

                <div class="countdown-timer mt-9 max-w-xl">
                    <div class="grid grid-cols-2 gap-3 sm:grid-cols-4">
                        <div class="countdown-card">
                            <span class="countdown-value" id="days">00</span>
                            <span class="countdown-label">Days</span>
                        </div>
                        <div class="countdown-card">
                            <span class="countdown-value" id="hours">00</span>
                            <span class="countdown-label">Hours</span>
                        </div>
                        <div class="countdown-card">
                            <span class="countdown-value" id="minutes">00</span>
                            <span class="countdown-label">Minutes</span>
                        </div>
                        <div class="countdown-card">
                            <span class="countdown-value" id="seconds">00</span>
                            <span class="countdown-label">Seconds</span>
                        </div>
                    </div>

                    <div class="launch-note mt-5 flex items-center gap-2 text-sm text-slate-600 sm:gap-3">
                        <span>Expected launch</span>
                        <span class="h-1.5 w-1.5 rounded-full bg-college-gold"></span>
                        <span id="launch-date-display" class="font-bold text-college-blue"></span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-college-navy text-white">
        <div class="mx-auto grid max-w-7xl gap-8 px-5 py-10 sm:grid-cols-2 lg:px-8">
            <div>
                <h2 class="text-lg font-extrabold uppercase tracking-wide">Madan Oli</h2>
            </div>

            <div class="sm:justify-self-end">
                <h3 class="text-sm font-bold uppercase tracking-[0.24em] text-college-gold">Follow</h3>
                <div class="mt-4 flex flex-wrap gap-3">
                    <a href="#" class="social-link" aria-label="Follow Madan Oli on Facebook">
                        <img src="assets/facebook.svg" alt="" aria-hidden="true">
                        <span class="sr-only">Facebook</span>
                    </a>
                    <a href="#" class="social-link" aria-label="Follow Madan Oli on X">
                        <img src="assets/x.svg" alt="" aria-hidden="true">
                        <span class="sr-only">X</span>
                    </a>
                    <a href="#" class="social-link" aria-label="Follow Madan Oli on Instagram">
                        <img src="assets/instagram.svg" alt="" aria-hidden="true">
                        <span class="sr-only">Instagram</span>
                    </a>
                    <a href="#" class="social-link" aria-label="Follow Madan Oli on LinkedIn">
                        <img src="assets/linkedin.svg" alt="" aria-hidden="true">
                        <span class="sr-only">LinkedIn</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="border-t border-white/10">
            <div class="mx-auto flex max-w-7xl flex-col gap-3 px-5 py-5 text-sm text-slate-300 sm:flex-row sm:items-center sm:justify-between lg:px-8">
                <p>&copy; 2025 Madan Oli. All rights reserved.</p>
                <p>Developed with <span class="font-bold text-red-400" aria-hidden="true">&#10084;</span><span
                        class="sr-only">love</span> by <a href="https://sathisoft.com/"
                        class="font-bold text-college-gold transition hover:text-white" target="_blank"
                        rel="noreferrer">Sathisoft</a></p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
